status-website:
  # Add your custom domain name, or remove the `cname` line if you don't have a domain
  # Uncomment the `baseUrl` line if you don't have a custom domain and add your repo name there
  cname: status.plone.org
  # baseUrl: /your-repo-name
  logoUrl: /images/icon.svg
  favicon: /images/favicon-32x32.png
  faviconSvg: /images/icon.svg
  name: Plone Status Page
  introTitle: "**Plone Status Page**"
  introMessage: Status of services and sites maintained by the Plone community. This solution is built using [Upptime](https://upptime.js.org/).
  navbar:
    - title: Status
      href: /
    - title: Plone Foundation
      href: https://plone.org/foundation

# Upptime also supports notifications, assigning issues, and more
# See https://upptime.js.org/docs/configuration
