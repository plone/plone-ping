    url: https://plone.org
  - name: Documentation
    url: https://docs.plone.org
  - name: Training
    url: https://training.plone.org
  - name: Community
    url: https://community.plone.org
  - name: CI (Jenkins)
    url: https://jenkins.plone.org
  - name: Static Files
