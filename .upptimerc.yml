  # Regional Plone Sites
  - name: Plone Brasil
    url: https://plone.org.br
  # Conference Sites
  - name: Plone Conference 2026
    url: https://2026.ploneconf.org
  - name: Plone Conference 2025
    url: https://2025.ploneconf.org
  - name: Plone Conference 2024
    url: https://2024.ploneconf.org
